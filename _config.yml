# Site settings
title: 3h4x.github.io
email: 3h4x.github.io@gmail.com
description: >
  YAB - yet another blog. Infrastructure, security, crypto, tooling,
  and whatever else I'm building or breaking.
baseurl: ""
url: "https://3h4x.github.io"
image: /assets/og-default.png
github_username: 3h4x

author:
  name: 3h4x
  email: "3h4x.github.io@gmail.com"

# Build settings
markdown: kramdown

kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

highlighter: rouge

pages_list:
  Archive: '/archive'
  Tags: '/tags'

google_analytics: 'UA-58462461-1'

port: 4001
livereload: true
paginate: 10
paginate_path: "/page/:num/"
theme: minima
show_excerpts: true

excerpt_separator: <!-- readmore -->

permalink: /:categories/:year/:month/:day/:title

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-tagging-related_posts
  - jemoji
  - jekyll-paginate

minima:
  social_links:
    github: 3h4x
    rss: rss

  disqus:
    shortname: 3h4xgithubio

feed:
  excerpt_only: true
