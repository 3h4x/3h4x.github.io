<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-content">
      <div class="footer-left">
        <span class="footer-title">{{ site.title | escape }}</span>
        <span class="footer-sep">&mdash;</span>
        <span class="footer-tagline">{{ site.description | strip_html | strip_newlines }}</span>
      </div>
      <div class="footer-right">
        {%- assign social = site.minima.social_links -%}
        <nav class="footer-links" aria-label="Social links">
          {%- if social.github -%}
          <a rel="me" href="https://github.com/{{ social.github }}" title="GitHub" aria-label="GitHub">
            <svg class="svg-icon" viewBox="0 0 16 16"><use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use></svg>
          </a>
          {%- endif -%}
          {%- if social.twitter -%}
          <a rel="me" href="https://twitter.com/{{ social.twitter }}" title="Twitter" aria-label="Twitter">
            <svg class="svg-icon" viewBox="0 0 16 16"><use xlink:href="{{ '/assets/minima-social-icons.svg#twitter' | relative_url }}"></use></svg>
          </a>
          {%- endif -%}
          {%- if social.linkedin -%}
          <a rel="me" href="https://www.linkedin.com/in/{{ social.linkedin }}" title="LinkedIn" aria-label="LinkedIn">
            <svg class="svg-icon" viewBox="0 0 16 16"><use xlink:href="{{ '/assets/minima-social-icons.svg#linkedin' | relative_url }}"></use></svg>
          </a>
          {%- endif -%}
          {%- if social.rss -%}
          <a href="{{ 'feed.xml' | relative_url }}" title="RSS Feed" aria-label="RSS Feed">
            <svg class="svg-icon" viewBox="0 0 16 16"><use xlink:href="{{ '/assets/minima-social-icons.svg#rss' | relative_url }}"></use></svg>
          </a>
          {%- endif -%}
        </nav>
      </div>
    </div>
  </div>
</footer>
<script>
  document.querySelectorAll('img:not([loading])').forEach(function(img) {
    img.setAttribute('loading', 'lazy');
  });
</script>
